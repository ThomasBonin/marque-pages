<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Chats du voisinage{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f0; }
    .navbar { background: #2d6a4f !important; }
    .navbar-brand, .nav-link { color: #d8f3dc !important; }
    .nav-link:hover { color: #fff !important; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.1); transition: transform .15s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.15); }
    .card-img-top { width: 100%; height: auto; display: block; }
    .img-placeholder { height: 180px; display:flex; align-items:center; justify-content:center; background:#c8e6c9; color:#555; font-size:3rem; }
    .badge-tag { background: #52b788; }
    .btn-primary { background: #2d6a4f; border-color: #2d6a4f; }
    .btn-primary:hover { background: #40916c; border-color: #40916c; }
    .filter-bar { background: #fff; border-radius: 12px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .stat-card { border-left: 4px solid #52b788; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
      <i class="bi bi-heart-fill"></i> Chats du voisinage
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}"><i class="bi bi-grid"></i> Galerie</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('ajouter') }}"><i class="bi bi-plus-circle"></i> Ajouter</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('stats') }}"><i class="bi bi-bar-chart"></i> Statistiques</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
