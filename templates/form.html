{% extends "base.html" %}
{% block title %}{{ action }} un chat{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card p-4">
      <h4 class="mb-4"><i class="bi bi-plus-circle"></i> {{ action }} un chat</h4>

      <form method="post" enctype="multipart/form-data" id="mainForm">

        <div class="mb-3 text-center">
          <label class="form-label d-block fw-semibold">Photo</label>
          {% if item and item.photo %}
            <img src="{{ item.photo }}" class="img-thumbnail mb-2" style="max-height:200px">
          {% endif %}
          <label class="btn btn-outline-secondary w-100">
            <i class="bi bi-image"></i> Choisir une photo
            <input type="file" name="photo" accept="image/*" class="d-none" id="filePhoto">
          </label>
          <small id="labelPhoto" class="text-muted d-block mt-1">Aucun fichier</small>
        </div>

        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Nom / Surnom</label>
            <input type="text" name="nom" class="form-control" placeholder="ex: Moustache"
                   value="{{ item.nom if item else '' }}">
          </div>
          <div class="col-6">
            <label class="form-label">Couleur / Robe</label>
            <input type="text" name="couleur" class="form-control" placeholder="ex: Tigré roux"
                   value="{{ item.couleur if item else '' }}">
          </div>
          <div class="col-6">
            <label class="form-label">Race</label>
            <input type="text" name="race" class="form-control" placeholder="ex: Européen"
                   value="{{ item.race if item else '' }}">
          </div>
          <div class="col-12">
            <label class="form-label">Sexe</label>
            <select name="sexe" class="form-select">
              <option value="">— Sélectionner —</option>
              {% for s in ['Mâle', 'Femelle', 'Inconnu'] %}
                <option value="{{ s }}" {% if item and item.sexe == s %}selected{% endif %}>{{ s }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Propriétaire</label>
            <input type="text" name="proprietaire" class="form-control" placeholder="Nom du propriétaire"
                   value="{{ item.proprietaire if item else '' }}">
          </div>
          <div class="col-12">
            <label class="form-label">Téléphone du propriétaire</label>
            <input type="tel" name="tel_proprietaire" class="form-control" placeholder="ex: 06 12 34 56 78"
                   value="{{ item.tel_proprietaire if item else '' }}" inputmode="tel">
          </div>
          <div class="col-12">
            <label class="form-label">Comportement <small class="text-muted">(séparés par des virgules)</small></label>
            <input type="text" name="comportements" id="comportementsInput" class="form-control"
                   placeholder="ex: Sociable, Craintif, Joueur..."
                   value="{{ item.comportements if item else '' }}">
            <div id="tagPreview" class="mt-1 d-flex flex-wrap gap-1"></div>
          </div>
          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="3"
                      placeholder="Observations, habitudes, zone de vie...">{{ item.notes if item else '' }}</textarea>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary flex-fill" id="submitBtn">
            <i class="bi bi-check-lg"></i> {{ action }}
          </button>
          <a href="{{ url_for('fiche', item_id=item.id) if item else url_for('index') }}"
             class="btn btn-outline-secondary flex-fill">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
document.getElementById('filePhoto').addEventListener('change', function() {
  document.getElementById('labelPhoto').textContent = this.files[0]?.name || 'Aucun fichier';
});

const input = document.getElementById('comportementsInput');
const tagPreview = document.getElementById('tagPreview');
function updateTags() {
  const tags = input.value.split(',').map(t => t.trim()).filter(t => t);
  tagPreview.innerHTML = tags.map(t => `<span class="badge badge-tag text-white">${t}</span>`).join('');
}
input.addEventListener('input', updateTags);
updateTags();

const MAX_SIZE_MB = 3;
function compressFile(file) {
  return new Promise(function(resolve) {
    if (!file || file.size < MAX_SIZE_MB * 1024 * 1024) { resolve(file); return; }
    try {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onerror = function() { URL.revokeObjectURL(url); resolve(file); };
      img.onload = function() {
        URL.revokeObjectURL(url);
        try {
          let w = img.width, h = img.height;
          const ratio = Math.min(1200/w, 1200/h, 1);
          w = Math.round(w*ratio); h = Math.round(h*ratio);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(function(blob) {
            resolve(blob ? new File([blob], file.name, {type:'image/jpeg'}) : file);
          }, 'image/jpeg', 0.80);
        } catch(e) { resolve(file); }
      };
      img.src = url;
    } catch(e) { resolve(file); }
  });
}

document.getElementById('mainForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Envoi en cours...';

  const form = e.target;
  const data = new FormData(form);
  const photoInput = document.getElementById('filePhoto');
  if (photoInput.files[0]) {
    const compressed = await compressFile(photoInput.files[0]);
    data.set('photo', compressed);
  }

  setTimeout(function() {
    if (btn.disabled) btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Upload en cours... (patientez)';
  }, 8000);

  try {
    const resp = await fetch(window.location.href, {method:'POST', body:data});
    if (resp.redirected) window.location.href = resp.url;
    else window.location.href = '/';
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-lg"></i> Réessayer';
    alert('Erreur réseau. Vérifiez votre connexion et réessayez.');
  }
});
</script>

{% endblock %}
